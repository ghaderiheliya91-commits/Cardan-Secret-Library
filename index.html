<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Land</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="stars"></div>

    <div id="welcome">

        <h1>📚 Book Land</h1>

        <h3>Where imagination lives forever</h3>

        <button onclick="enterLibrary()">
            Enter the Library
        </button>

    </div>

    <div id="library">

        <h2>📚 Our Collection</h2>

        <div class="books">

            <div class="book">
                <div class="cover">
                    The Forgotten Story
                </div>
            </div>

            <div class="book">
                <div class="cover">
                    The Last Page
                </div>
            </div>

            <div class="book">
                <div class="cover">
                    Secrets Between Stars
                </div>
            </div>

        </div>

    </div>

    <button id="topBtn" onclick="topFunction()">⬆</button>

    <script src="script.js"></script>

</body>

</html>
