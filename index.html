<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardan's Secret Library</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="stars"></div>
    <div id="welcome">

        <h1>📚 Cardan's Secret Library</h1>

        <p>
            Every story begins with a secret...
        </p>

        <button onclick="enterLibrary()">

        </button>

    </div>

    <div id="library">

        <h2>My Books</h2>

        <div class="books">

            <div class="book">
                <div class="cover">
                    The Forgotten Story
                </div>
            </div>

            <div class="book">
                <div class="cover">
                    The Last Page
                </div>
            </div>

            <div class="book">
                <div class="cover">
                    Secrets Between Stars
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
<button id="topBtn" onclick="topFunction()">⬆</button>
</body>

</html>
